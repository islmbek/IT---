<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Архив ісі — Кім миллиардер болғысы келеді?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#9A7200;--gold-light:#C49A00;--gold-bg:#FFF8E1;--gold-border:#D4AC3A;
  --navy:#1A2744;--navy-mid:#2C3E6B;
  --text-primary:#0D1B2A;--text-secondary:#3A4A5C;--text-muted:#6B7C8D;
  --bg-page:#F4EFE6;--bg-card:#FFFFFF;--bg-warm:#FAF6EF;--border:#D4C5A0;
  --correct:#1B5E20;--correct-bg:#E8F5E9;--wrong:#7F0000;--wrong-bg:#FFEBEE;
  --sel-bg:#E3EAF8;--sel-border:#3A5FAD;
}
body{font-family:"Source Serif 4",Georgia,serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;}
.top-bar{background:linear-gradient(90deg,var(--navy) 0%,var(--navy-mid) 50%,var(--gold-light) 100%);height:5px;width:100%;position:fixed;top:0;z-index:100}
.site-header{background:var(--bg-card);border-bottom:2px solid var(--gold-border);padding:13px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:5px;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.header-logo{display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-text-main{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;color:var(--navy);line-height:1.2}
.header-text-sub{font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase}
.header-badge{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px}
.page-wrap{max-width:1020px;margin:0 auto;padding:32px 20px 60px}
.screen{animation:slideUp .45s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.qr-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:24px}
.qr-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px}
.qr-title{font-family:"Playfair Display",serif;font-size:clamp(28px,4vw,44px);font-weight:900;color:var(--navy);margin-bottom:6px}
.qr-subtitle{font-size:16px;color:var(--text-secondary);margin-bottom:32px;font-style:italic}
.qr-card{background:var(--bg-card);border:2px solid var(--gold-border);border-radius:24px;padding:36px 40px;display:inline-flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 6px 32px rgba(184,134,11,.12)}
.qr-img{width:220px;height:220px;border-radius:12px;border:3px solid var(--navy);display:block}
.qr-divider{width:100%;height:1px;background:var(--gold-border);opacity:.5}
.qr-pw-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:600}
.qr-pw{font-family:"Playfair Display",serif;font-size:48px;font-weight:900;color:var(--navy);letter-spacing:8px}
.qr-hint{font-size:13px;color:var(--text-muted);margin-top:4px}
.qr-continue-label{font-size:14px;color:var(--text-secondary);margin-top:28px;margin-bottom:10px}
.qr-btn{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border:none;padding:15px 48px;font-size:17px;font-weight:600;border-radius:50px;cursor:pointer;font-family:"Source Serif 4",serif;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(26,39,68,.22)}
.qr-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(26,39,68,.32)}
.pw-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:24px}
.pw-card{background:var(--bg-card);border:2px solid var(--gold-border);border-radius:20px;padding:40px;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(184,134,11,.1)}
.pw-icon{font-size:48px;margin-bottom:16px}
.pw-title{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--navy);margin-bottom:8px}
.pw-sub{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.pw-input{width:100%;padding:14px 20px;font-size:22px;font-family:"Playfair Display",serif;font-weight:700;letter-spacing:6px;text-align:center;border:2px solid var(--border);border-radius:12px;background:var(--bg-warm);color:var(--navy);outline:none;transition:border-color .2s;margin-bottom:16px}
.pw-input:focus{border-color:var(--gold-border)}
.pw-input.error{border-color:#EF5350;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-error{font-size:13px;color:var(--wrong);margin-bottom:12px;min-height:18px}
.pw-btn{width:100%;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border:none;padding:14px;font-size:16px;font-weight:600;border-radius:12px;cursor:pointer;font-family:"Source Serif 4",serif;transition:transform .2s}
.pw-btn:hover{transform:translateY(-1px)}
.start-hero{text-align:center;padding:24px 0 44px}
.hero-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
.hero-title{font-family:"Playfair Display",serif;font-size:clamp(32px,5vw,56px);font-weight:900;color:var(--navy);line-height:1.1;margin-bottom:10px}
.hero-title span{color:var(--gold-light)}
.hero-subtitle{font-size:18px;color:var(--text-secondary);margin-bottom:28px;font-style:italic}
.hero-divider{width:70px;height:3px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);margin:0 auto 28px}
.topic-card{display:inline-flex;align-items:center;gap:10px;background:var(--bg-card);border:1.5px solid var(--gold-border);border-radius:12px;padding:14px 28px;font-size:15px;color:var(--navy);margin-bottom:36px;box-shadow:0 2px 16px rgba(184,134,11,.1)}
.info-row{display:flex;justify-content:center;gap:20px;margin-bottom:40px;flex-wrap:wrap}
.info-pill{background:var(--bg-card);border:1.5px solid var(--border);border-radius:10px;padding:12px 22px;text-align:center}
.info-pill-val{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;color:var(--navy)}
.info-pill-lbl{font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
.start-btn{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border:none;padding:17px 54px;font-size:18px;font-weight:600;border-radius:50px;cursor:pointer;font-family:"Source Serif 4",serif;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(26,39,68,.22)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(26,39,68,.32)}
.game-grid{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}
@media(max-width:720px){.game-grid{grid-template-columns:1fr}.q-nav-panel{display:none}}
.q-nav-panel{background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;position:sticky;top:80px;box-shadow:0 2px 14px rgba(0,0,0,.06)}
.nav-header{background:var(--navy);color:#fff;text-align:center;padding:11px;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px}
.nav-num{width:100%;aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-warm);color:var(--text-secondary);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;font-family:"Source Serif 4",serif;display:flex;align-items:center;justify-content:center}
.nav-num:hover{background:var(--sel-bg);border-color:var(--sel-border);color:var(--navy)}
.nav-num.current{background:var(--navy);color:#fff;border-color:var(--navy);transform:scale(1.08);box-shadow:0 2px 10px rgba(26,39,68,.25)}
.nav-num.ok{background:var(--correct-bg);border-color:#4CAF50;color:var(--correct)}
.nav-num.no{background:var(--wrong-bg);border-color:#EF5350;color:var(--wrong)}
.nav-legend{padding:10px 12px 14px;border-top:1px solid #F0EAD8;display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-muted)}
.legend-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.q-main{display:flex;flex-direction:column;gap:16px}
.progress-wrap{background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;padding:13px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.progress-label{font-size:12px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.progress-bar-track{flex:1;height:7px;background:#EDE8DC;border-radius:10px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold-light));border-radius:10px;transition:width .5s ease}
.progress-count{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;color:var(--navy);white-space:nowrap}
.lifelines-wrap{display:flex;gap:10px;flex-wrap:wrap}
.ll-btn{display:flex;align-items:center;gap:7px;background:var(--bg-card);border:1.5px solid var(--border);color:var(--text-primary);padding:9px 18px;border-radius:30px;cursor:pointer;font-size:13px;font-family:"Source Serif 4",serif;font-weight:600;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.ll-btn:hover:not(:disabled){background:var(--navy);color:#fff;border-color:var(--navy);transform:translateY(-1px)}
.ll-btn:disabled{opacity:.32;cursor:not-allowed;text-decoration:line-through}
.question-box{background:var(--bg-card);border:2px solid var(--gold-border);border-radius:20px;padding:30px 30px 22px;text-align:center;font-size:clamp(15px,2.3vw,18px);line-height:1.65;color:var(--navy);font-weight:600;box-shadow:0 4px 24px rgba(184,134,11,.09);position:relative}
.q-number-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 16px;border-radius:20px;white-space:nowrap}
.hint-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--gold-border);color:var(--gold);font-size:13px;font-family:"Source Serif 4",serif;padding:7px 18px;border-radius:20px;cursor:pointer;margin-top:14px;transition:all .2s}
.hint-btn:hover{background:var(--gold-bg)}
.hint-box{background:var(--gold-bg);border:1.5px solid var(--gold-border);border-radius:12px;padding:14px 18px;margin-top:12px;text-align:left;animation:slideUp .3s ease}
.hint-box-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
.hint-box-text{font-size:14px;line-height:1.7;color:#5A4000}
.ai-modal{background:#F0FAF5;border:1.5px solid #6CC99A;border-radius:16px;padding:18px 22px;animation:slideUp .35s ease}
.ai-modal-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#1B6B45;font-weight:700;margin-bottom:10px}
.ai-modal-text{font-size:14px;line-height:1.75;color:#1A4A30}
.fifty-note{background:#EEF2FF;border:1.5px solid #9BAEE0;border-radius:14px;padding:12px 18px;font-size:14px;color:#2A3A7A;font-weight:600;text-align:center}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.answers-grid{grid-template-columns:1fr}}
.ans-btn{display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1.5px solid var(--border);color:var(--text-primary);padding:14px 18px;border-radius:14px;cursor:pointer;text-align:left;font-size:14px;font-family:"Source Serif 4",serif;font-weight:600;line-height:1.4;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.ans-btn:hover:not(:disabled){background:var(--sel-bg);border-color:var(--sel-border);transform:translateY(-1px)}
.ans-btn .letter{width:32px;height:32px;border-radius:50%;background:var(--bg-warm);border:1.5px solid var(--border);color:var(--navy);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ans-btn.selected{background:var(--sel-bg);border-color:var(--sel-border)}
.ans-btn.selected .letter{background:var(--sel-border);color:#fff;border-color:var(--sel-border)}
.ans-btn.correct{background:var(--correct-bg);border-color:#4CAF50;color:var(--correct);animation:correctPulse .45s ease}
.ans-btn.correct .letter{background:#4CAF50;color:#fff;border-color:#4CAF50}
.ans-btn.wrong{background:var(--wrong-bg);border-color:#EF5350;color:var(--wrong)}
.ans-btn.wrong .letter{background:#EF5350;color:#fff;border-color:#EF5350}
.ans-btn.hidden-fifty{opacity:.18;pointer-events:none}
.ans-btn:disabled{cursor:default}
@keyframes correctPulse{0%{transform:scale(1)}40%{transform:scale(1.025)}100%{transform:scale(1)}}
.proof-box{background:linear-gradient(135deg,#F0F7FF,#E8F5E9);border:1.5px solid #7CB9E8;border-radius:14px;padding:16px 20px;animation:slideUp .4s ease}
.proof-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#1565C0;font-weight:700;margin-bottom:8px}
.proof-text{font-size:14px;line-height:1.75;color:#0D2B5E}
.next-btn{display:block;width:100%;background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border:none;padding:15px;font-size:16px;font-weight:600;border-radius:14px;cursor:pointer;font-family:"Source Serif 4",serif;transition:transform .2s,box-shadow .2s;box-shadow:0 3px 16px rgba(26,39,68,.22);animation:slideUp .4s ease}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(26,39,68,.3)}
.result-wrap{max-width:720px;margin:0 auto;text-align:center}
.result-medal{font-size:76px;margin-bottom:16px}
.result-title{font-family:"Playfair Display",serif;font-size:34px;font-weight:900;color:var(--navy);margin-bottom:8px}
.result-score{font-size:17px;color:var(--text-secondary);margin-bottom:28px}
.result-score strong{color:var(--navy);font-size:21px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.summary-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:14px;padding:16px 12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.summary-val{font-family:"Playfair Display",serif;font-size:28px;font-weight:700;color:var(--navy)}
.summary-lbl{font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.review-section{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:28px;text-align:left}
.review-header{background:var(--navy);color:#fff;padding:13px 20px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.review-item{padding:16px 20px;border-bottom:1px solid #F0EAD8}
.review-item:last-child{border-bottom:none}
.review-q{font-size:14px;color:var(--navy);font-weight:600;margin-bottom:7px;line-height:1.5}
.review-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.rtag{font-size:12px;padding:3px 12px;border-radius:20px;font-weight:600}
.rtag.correct{background:var(--correct-bg);color:var(--correct)}
.rtag.wrong{background:var(--wrong-bg);color:var(--wrong)}
.rtag.skipped{background:#F3F3F3;color:#888}
.review-explain{font-size:13px;color:var(--text-secondary);line-height:1.7;border-left:3px solid var(--gold-border);padding-left:13px;font-style:italic}
.replay-btn{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border:none;padding:16px 52px;font-size:17px;font-weight:600;border-radius:50px;cursor:pointer;font-family:"Source Serif 4",serif;transition:transform .2s;box-shadow:0 4px 24px rgba(26,39,68,.22)}
.replay-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <div class="header-icon">📁</div>
    <div>
      <div class="header-text-main">Архив ісі — Викторина</div>
      <div class="header-text-sub">Оқу ойыны · 2026</div>
    </div>
  </div>
  <div class="header-badge" id="hbadge">20 сұрақ</div>
</header>
<div class="page-wrap"><div id="app"></div></div>

  const nav=Array.from({length:20},(_,i)=>{
    let c="nav-num";
    if(i===G.cur)c+=" current";
    else if(G.answers[i]===true)c+=" ok";
    else if(G.answers[i]===false)c+=" no";
    return `<button class="${c}" onclick="goToQ(${i})">${i+1}</button>`;
  }).join("");
  let helper="";
  if(G.aiText)helper=`<div class="ai-modal"><div class="ai-modal-title">🤖 Жасанды интеллект талдауы</div><div class="ai-modal-text">${G.aiText}</div></div>`;
  else if(G.fiftyHidden.length)helper=`<div class="fifty-note">½ 50:50 — Екі нұсқа алып тасталды</div>`;
  const hintHtml=G.hintVisible
    ?`<div class="hint-box"><div class="hint-box-title">💡 Кеңес</div><div class="hint-box-text">${q.hint}</div></div>`
    :`<button class="hint-btn" onclick="toggleHint()">💡 Кеңес алу</button>`;
  const ans=q.a.map((a,i)=>{
    let c="";
    if(G.fiftyHidden.includes(i))c="hidden-fifty";
    else if(G.revealed){if(i===q.correct)c="correct";else if(i===G.selected)c="wrong";}
    else if(G.selected===i)c="selected";
    return `<button class="ans-btn ${c}" onclick="selectAnswer(${i})" ${G.revealed||G.fiftyHidden.includes(i)?"disabled":""}><span class="letter">${L[i]}</span>${a}</button>`;
  }).join("");
  const proof=G.revealed?`<div class="proof-box"><div class="proof-title">📜 Заңнамалық негіз</div><div class="proof-text">${q.proof}</div></div>`:"";
  const nxt=G.cur===19?"🏆 Нәтижені көру":"Келесі сұрақ →";
  return `<div class="screen"><div class="game-grid">
    <div class="q-nav-panel">
      <div class="nav-header">Сұрақтар</div>
      <div class="nav-grid">${nav}</div>
      <div class="nav-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#E8F5E9;border:1.5px solid #4CAF50"></div>Дұрыс жауап</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FFEBEE;border:1.5px solid #EF5350"></div>Қате жауап</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1A2744"></div>Ағымдағы</div>
      </div>
    </div>
    <div class="q-main">
      <div class="progress-wrap">
        <span class="progress-label">Прогресс</span>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="progress-count">${G.cur+1} / 20</span>
      </div>
      <div class="lifelines-wrap">
        <button class="ll-btn" onclick="useFifty()" ${!G.ll.fifty?"disabled":""}><span>½</span> 50:50</button>
        <button class="ll-btn" onclick="useAI()" ${!G.ll.ai?"disabled":""}><span>🤖</span> ЖИ көмегі</button>
      </div>
      ${helper}
      <div class="question-box">
        <span class="q-number-badge">Сұрақ ${G.cur+1}</span>
        ${q.q}
        ${hintHtml}
      </div>
      <div class="answers-grid">${ans}</div>
      ${proof}
      ${G.revealed?`<button class="next-btn" onclick="nextQ()">${nxt}</button>`:""}
    </div>
  </div></div>`;
}

function rResult(){
  const pct=Math.round(G.score/20*100);
  const medal=pct>=90?"🏆":pct>=70?"🥇":pct>=50?"🥈":"📚";
  const title=pct>=90?"Керемет! Сіз нағыз архив маманысыз!":pct>=70?"Жақсы нәтиже!":pct>=50?"Орта нәтиже. Ережелерді қайталаңыз!":"Оқуды жалғастыру керек!";
  const wrong=G.answers.filter(a=>a===false).length;
  const rev=Q.map((q,i)=>{
    const a=G.answers[i];
    let tag=a===true?`<span class="rtag correct">✓ Дұрыс жауап</span>`:a===false?`<span class="rtag wrong">✗ Қате жауап</span><span class="rtag correct">✓ Дұрысы: ${q.a[q.correct]}</span>`:`<span class="rtag skipped">— Жауап берілмеді</span><span class="rtag correct">✓ Дұрысы: ${q.a[q.correct]}</span>`;
    return `<div class="review-item"><div class="review-q">${i+1}. ${q.q}</div><div class="review-tags">${tag}</div><div class="review-explain">${q.proof}</div></div>`;
  }).join("");
  return `<div class="screen result-wrap">
    <div class="result-medal">${medal}</div>
    <h2 class="result-title">${title}</h2>
    <div class="result-score">Дұрыс жауап: <strong>${G.score}</strong> / 20 &nbsp;·&nbsp; ${pct}%</div>
    <div class="summary-grid">
      <div class="summary-card"><div class="summary-val">${G.score}</div><div class="summary-lbl">Дұрыс</div></div>
      <div class="summary-card"><div class="summary-val">${wrong}</div><div class="summary-lbl">Қате</div></div>
      <div class="summary-card"><div class="summary-val">${pct}%</div><div class="summary-lbl">Нәтиже</div></div>
    </div>
    <div class="review-section"><div class="review-header">📖 Барлық сұрақтың заңнамалық талдауы</div>${rev}</div>
    <button class="replay-btn" onclick="startGame()">🔄 Қайта бастау</button>
  </div>`;
}

function checkPW(){
  if(G.pwValue===PASSWORD){G.screen="start";render();}
  else{G.pwError="Құпиясөз қате. Қайта енгізіңіз.";render();setTimeout(()=>{const e=document.getElementById("pwIn");if(e){e.value="";e.focus();}G.pwValue="";},200);}
}

function startGame(){
  Object.assign(G,{cur:0,score:0,answers:new Array(20).fill(null),ll:{fifty:true,ai:true},selected:null,revealed:false,aiText:null,fiftyHidden:[],hintVisible:false,screen:"game"});
  render();
}

function goToQ(i){Object.assign(G,{cur:i,selected:null,revealed:false,aiText:null,fiftyHidden:[],hintVisible:false});render();}

function selectAnswer(i){
  if(G.revealed||G.selected!==null)return;
  G.selected=i;render();
  setTimeout(()=>{
    G.revealed=true;const ok=i===Q[G.cur].correct;
    G.answers[G.cur]=ok;if(ok)G.score++;render();
  },900);
}

function nextQ(){
  if(G.cur>=19){G.screen="result";render();return;}
  Object.assign(G,{cur:G.cur+1,selected:null,revealed:false,aiText:null,fiftyHidden:[],hintVisible:false});render();
}

function toggleHint(){G.hintVisible=!G.hintVisible;render();}

function useFifty(){
  if(!G.ll.fifty||G.revealed)return;
  G.ll.fifty=false;
  const wr=[0,1,2,3].filter(i=>i!==Q[G.cur].correct);
  G.fiftyHidden=wr.sort(()=>Math.random()-.5).slice(0,2);
  G.aiText=null;render();
}

function useAI(){
  if(!G.ll.ai||G.revealed)return;
  G.ll.ai=false;
  const d=["Бұл сұрақты логикалық тұрғыдан талдайын. Нұсқалардың ішінде кем дегенде екеуін бірден алып тастауға болады — олар ереженің жалпы принципіне қайшы немесе шектен тыс. Архив заңнамасы ең қауіпсіз, тексерілген нормаларды таңдайды. Қалған нұсқалардың ішінен нормативтік практикада жиі қолданылатын мәнге назар аударыңыз. Соңғы шешім — сіздің ойыңызда.","Сұрақты мұқият зерделедім. Жауап нұсқаларының ішінде бір немесе екі нұсқа — шектен тыс немесе заңнамалық нормаға сәйкес келмейтін мәндер. Архив ережелері нақтылық пен ыңғайлылыққа негізделген. Дұрыс бапты еске түсіріңіз — жауап сол тармақта.","Талдауым: нұсқалардың ішінде екеуін мазмұны бойынша алып тастауға болады. Архив заңнамасы ережелерде арнайы сандық немесе сапалық шектерді бекітеді. Сіз де сол логикамен жүрсеңіз — дұрыс жауапқа жетесіз."];
  G.aiText=d[Math.floor(Math.random()*3)];render();
}

render();
</script></body></html>
